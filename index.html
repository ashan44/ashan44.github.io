/* feasability columns */

.line{
     height: 25px;
     min-width: 800px;
     margin: 0 auto 10px;
     line-height: 25px;
     font-size: 14px;
     color: #fff;
     padding: 0 0 0 10px;
     position: relative;
 }

 .line::before{
     content: '';
     width: 100%;
     position: absolute;
     left: 0;
     height: 25px;
     top: 0;
     z-index: -2;
     
 }

 .line::after{
     content: '';
     background: #4a7885;
     border: 2px solid #3f26d0;
     height: 25px;
     transition: 0.8s;
     display: block;
     width: 90%;
     animation: animate 1 5s;
     position: absolute;
     top: 0;
     left: 0;
     z-index: -1;
 }
 .line1::after{
     max-width: 70%;
 }
 .line2::after{
   max-width: 48.5%;
 }
 .line3::after{
   max-width: 12%;
 }
 .line4::after{

 }

 }

 }
